name: Deploy to GitHub Pages

# Requires Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# The github-pages environment only accepts deployments from the gh-pages
# branch, so deploys run from there. To ship: git push origin main:gh-pages
on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
