name: Deploy to GitHub Pages

# Pages is served from the gh-pages branch (branch-based build).
# This workflow keeps gh-pages in sync with main on every push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror main to gh-pages
        run: git push origin HEAD:gh-pages --force
