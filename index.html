<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#050614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Learnæway — Path to Trading Course. The education arm of the Æway ecosystem.">
  <title>Learnæway</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/pwa/icon-192.png">
  <link rel="apple-touch-icon" href="assets/pwa/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app">

    <!-- ============ HEADER ZONE (looping video — action icons live in the card footer) ============ -->
    <header class="header-zone" id="headerZone">
      <video
        id="waveVideo"
        class="wave-bg wave-video"
        poster="assets/backgrounds/wave-header@2x.png"
        autoplay muted loop playsinline webkit-playsinline preload="auto"
      >
        <source src="assets/video/wave-header-loop.mp4" type="video/mp4">
        <source src="assets/video/wave-header-loop.webm" type="video/webm">
      </video>
      <div class="wave-bg wave-still" aria-hidden="true"></div>
    </header>

    <!-- ============ TOP BARS (two separate pills, per corrected round-3 spec) ============ -->
    <div class="bar">
      <button id="btnMenu" class="bar-icon" aria-label="Open course menu">
        <img src="assets/nav-icons/icon-menu@2x.png" alt="">
      </button>
      <div id="barTitle" class="bar-title">Learnæway's Path to Trading Course</div>
      <button id="btnSettings" class="bar-icon" aria-label="Open settings">
        <img src="assets/nav-icons/icon-settings@2x.png" alt="">
      </button>
    </div>
    <div class="bar">
      <button id="btnProfile" class="bar-icon" aria-label="Open profile">
        <img src="assets/nav-icons/icon-user@2x.png" alt="">
      </button>
      <div class="progress-track" aria-hidden="false">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
        <span id="progressLabel" class="progress-label">0%</span>
      </div>
      <button id="btnChecklist" class="bar-icon" aria-label="Daily trading checklist"></button>
    </div>

    <!-- ===================== MAIN CONTENT CARD ===================== -->
    <main class="card-outer" id="cardOuter">
      <div class="card" id="card">
        <div class="card-scroll" id="cardScroll">
          <!-- view content injected by app.js -->
        </div>
        <div class="card-footer" id="cardFooter">
          <img class="wordmark" src="assets/logo/logo-wordmark@3x.png" alt="Learnæway">
          <div class="footer-row">
            <button id="btnNotes" class="footer-icon" aria-label="Notes for this screen"></button>
            <button id="btnAskAeway" class="action-btn" aria-label="Ask Æway">
              <img src="assets/buttons-icon/btn-ask-aeway-v2@2x.png" alt="">
            </button>
            <button id="btnVolume" class="action-btn" aria-label="Toggle sound">
              <img id="volumeImg" src="assets/buttons-icon/btn-volume-on@2x.png" alt="">
            </button>
            <button id="btnPlay" class="action-btn" aria-label="Play narration">
              <img id="playImg" src="assets/buttons-icon/btn-play@2x.png" alt="">
            </button>
            <button id="btnReplay" class="action-btn" aria-label="Replay narration">
              <img src="assets/buttons-icon/btn-replay@2x.png" alt="">
            </button>
            <button id="btnHeart" class="footer-icon" aria-label="Like this screen"></button>
          </div>
        </div>
      </div>
    </main>

    <!-- ==== BOTTOM DOCK: one continuous bar — Home · Knowledge Test (soon) · Video (soon) ==== -->
    <nav class="bottom-nav">
      <button id="navHome" class="dock-btn" aria-label="Home">
        <img src="assets/nav-icons/icon-home@2x.png" alt="">
      </button>
      <button id="navQuiz" class="dock-btn" aria-label="Knowledge test — coming soon">
        <img src="assets/nav-icons/icon-knowledge-test-lightning@2x.png" alt="">
      </button>
      <button id="navVideo" class="dock-btn" aria-label="Video lessons — coming soon">
        <img src="assets/nav-icons/icon-video-play@2x.png" alt="">
      </button>
    </nav>

    <!-- ===================== OVERLAYS ===================== -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-panel" id="overlayPanel"></div>
    </div>

    <!-- ===================== AUTH (pre-login entry, UI only) ===================== -->
    <div id="authScreen" class="auth-screen hidden">
      <div class="auth-wave"></div>

      <!-- Step 1: access gate — data capture + passcode gatekeeper -->
      <div id="gateStep" class="auth-card-outer hidden">
        <div class="auth-card">
          <img class="auth-logo" src="assets/logo/logo-symbol-v2@3x.png" alt="Learnæway logo">
          <img class="auth-wordmark" src="assets/logo/logo-wordmark@3x.png" alt="Learnæway">
          <div class="gate-title">Beta Access</div>
          <form id="gateForm" autocomplete="off" novalidate>
            <input class="g-pill auth-input" name="firstName" type="text" placeholder="First Name">
            <input class="g-pill auth-input" name="lastName" type="text" placeholder="Last Name">
            <input class="g-pill auth-input" name="email" type="email" placeholder="Email">
            <input class="g-pill auth-input" name="phone" type="tel" placeholder="Phone Number">
            <input class="g-pill auth-input" name="passcode" type="password" placeholder="Passcode">
            <div id="gateError" class="gate-error hidden">Invalid passcode — access denied.</div>
            <button type="submit" class="g-pill auth-submit">Enter</button>
          </form>
        </div>
      </div>

      <!-- Step 2: login (existing screen, unchanged) -->
      <div id="loginStep" class="auth-card-outer">
        <div class="auth-card">
          <img class="auth-logo" src="assets/logo/logo-symbol-v2@3x.png" alt="Learnæway logo">
          <img class="auth-wordmark" src="assets/logo/logo-wordmark@3x.png" alt="Learnæway">
          <div class="auth-tabs" role="tablist">
            <button id="authTabLogin" class="g-pill auth-tab active" role="tab" aria-selected="true">Log In</button>
            <button id="authTabSignup" class="g-pill auth-tab" role="tab" aria-selected="false">Sign Up</button>
          </div>
          <form id="authForm" autocomplete="off" novalidate>
            <!-- fields injected by app.js based on active tab -->
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="data/course-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
